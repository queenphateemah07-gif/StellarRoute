name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  sdk-checks:
    name: JS SDK Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: sdk-js/package-lock.json
      - name: Install dependencies
        run: cd sdk-js && npm ci --legacy-peer-deps
      - name: Build
        run: cd sdk-js && npm run build
      - name: Run tests
        run: cd sdk-js && npm test

  api-integration-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stellarroute
          POSTGRES_PASSWORD: stellarroute_dev
          POSTGRES_DB: stellarroute
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stellarroute"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://stellarroute:stellarroute_dev@localhost:5432/stellarroute
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integration-

      - name: Run indexer migrations (base schema)
        run: |
          for f in crates/indexer/migrations/*.sql; do
            echo "Applying $f"
            PGPASSWORD=stellarroute_dev psql \
              -h localhost -U stellarroute -d stellarroute \
              -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run API migrations (API-specific tables)
        run: |
          for f in crates/api/migrations/*.sql; do
            echo "Applying $f"
            PGPASSWORD=stellarroute_dev psql \
              -h localhost -U stellarroute -d stellarroute \
              -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run ignored API integration tests
        run: cargo test -p stellarroute-api -- --ignored
        env:
          DATABASE_URL: postgres://stellarroute:stellarroute_dev@localhost:5432/stellarroute
          REDIS_URL: redis://localhost:6379

  frontend-build:
    name: Frontend Production Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --prefix frontend
      - name: Lint frontend
        run: npm --prefix frontend run lint
      - name: Build frontend
        run: npm --prefix frontend run build
      - name: Performance budget check
        run: npm --prefix frontend run perf:check:ci
        continue-on-error: false
        env:
          CI: "true"
